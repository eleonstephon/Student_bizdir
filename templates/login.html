{% extends "base.html" %}
{% block title %}Log In — StuBiz{% endblock %}

{% block main %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="text-center mb-4">
                <h2 class="fw-bold">Welcome Back</h2>
                <p class="text-muted">Log in to manage your business listings.</p>
            </div>

            <form action="/login" method="POST" class="login-form">

                <div class="mb-3">
                    <label class="form-label fw-bold">Email Address *</label>
                    <input type="email" name="email" class="form-control"
                           placeholder="your@email.com" required autofocus>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Password *</label>
                    <input type="password" name="password" class="form-control"
                           placeholder="Your password" required>
                </div>

                <button type="submit" class="btn btn-warning w-100 fw-bold py-2">
                    Log In
                </button>

                <p class="text-center mt-3 text-muted" style="font-size:14px;">
                    Don't have an account?
                    <a href="/signup" class="text-warning fw-bold">Sign up</a>
                </p>

            </form>
        </div>
    </div>
</div>
{% endblock main %}
